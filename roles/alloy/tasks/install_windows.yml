---
- name: Set default NSSM paths
  ansible.builtin.set_fact:
    alloy_windows_nssm_zip_url: "{{ alloy_windows_nssm_zip_url | default('https://nssm.cc/ci/nssm-2.24-101-g897c7ad.zip') }}"
    alloy_windows_nssm_zip_path: "{{ alloy_windows_nssm_zip_path | default('C:\\ProgramData\\Alloy\\nssm.zip') }}"
    alloy_windows_nssm_dir: "{{ alloy_windows_nssm_dir | default('C:\\ProgramData\\Alloy\\nssm') }}"
    alloy_windows_nssm_exe: "{{ alloy_windows_nssm_exe | default('C:\\ProgramData\\Alloy\\nssm\\nssm-2.24-101-g897c7ad\\win64\\nssm.exe') }}"

- name: Download NSSM
  ansible.windows.win_get_url:
    url: "{{ alloy_windows_nssm_zip_url }}"
    dest: "{{ alloy_windows_nssm_zip_path }}"
    force: false

- name: Extract NSSM
  community.windows.win_unzip:
    src: "{{ alloy_windows_nssm_zip_path }}"
    dest: "{{ alloy_windows_nssm_dir }}"
    delete_archive: false

- name: Verify NSSM exists
  ansible.windows.win_stat:
    path: "{{ alloy_windows_nssm_exe }}"
  register: alloy_windows_nssm_stat

- name: Fail if NSSM was not extracted
  ansible.builtin.fail:
    msg: "NSSM was not found at {{ alloy_windows_nssm_exe }}"
  when: not alloy_windows_nssm_stat.stat.exists

- name: Ensure Alloy config directory exists on Windows
  ansible.windows.win_file:
    path: "{{ alloy_config_dir }}"
    state: directory

- name: Ensure Alloy data directory exists on Windows
  ansible.windows.win_file:
    path: "{{ alloy_storage_path }}"
    state: directory

- name: Ensure Alloy binary directory exists on Windows
  ansible.windows.win_file:
    path: "{{ alloy_windows_bin_dir | default('C:\\ProgramData\\Alloy\\bin') }}"
    state: directory

- name: Set default Windows Alloy zip download URL
  ansible.builtin.set_fact:
    alloy_windows_download_url: "{{ alloy_windows_download_url | default('https://github.com/grafana/alloy/releases/latest/download/alloy-windows-amd64.exe.zip') }}"

- name: Set default Windows Alloy zip path
  ansible.builtin.set_fact:
    alloy_windows_zip_path: "{{ alloy_windows_zip_path | default('C:\\ProgramData\\Alloy\\alloy-windows-amd64.exe.zip') }}"

- name: Set default Windows Alloy executable path
  ansible.builtin.set_fact:
    alloy_windows_default_exe: "{{ alloy_windows_default_exe | default('C:\\ProgramData\\Alloy\\bin\\alloy-windows-amd64.exe') }}"

- name: Check whether Alloy executable already exists
  ansible.windows.win_stat:
    path: "{{ alloy_windows_default_exe }}"
  register: alloy_windows_exe_stat

- name: Download Alloy Windows binary zip
  ansible.windows.win_get_url:
    url: "{{ alloy_windows_download_url }}"
    dest: "{{ alloy_windows_zip_path }}"
    force: "{{ alloy_upgrade | bool }}"
  when:
    - alloy_upgrade | bool or not alloy_windows_exe_stat.stat.exists

- name: Extract Alloy Windows binary zip
  community.windows.win_unzip:
    src: "{{ alloy_windows_zip_path }}"
    dest: "{{ alloy_windows_bin_dir | default('C:\\ProgramData\\Alloy\\bin') }}"
    delete_archive: false
  when:
    - alloy_upgrade | bool or not alloy_windows_exe_stat.stat.exists

- name: Check whether extracted Alloy executable exists
  ansible.windows.win_stat:
    path: "{{ alloy_windows_default_exe }}"
  register: alloy_windows_extracted_exe_stat

- name: Fail if Alloy executable was not extracted
  ansible.builtin.fail:
    msg: "Alloy executable was not found at {{ alloy_windows_default_exe }} after extracting {{ alloy_windows_zip_path }}"
  when: not alloy_windows_extracted_exe_stat.stat.exists

- name: Verify Alloy executable runs on Windows
  ansible.windows.win_command: '"{{ alloy_windows_default_exe }}" --version'
  register: alloy_windows_version_check
  changed_when: false

- name: Set Windows Alloy executable fact
  ansible.builtin.set_fact:
    alloy_windows_exe: "{{ alloy_windows_default_exe }}"
