---
- name: Stop on unsupported hosts
  ansible.builtin.meta: end_host
  when: ansible_facts["os_family"] != "Debian"

- name: Ensure postgres_exporter user exists
  ansible.builtin.user:
    name: "{{ postgres_exporter_user }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Download postgres_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v{{ postgres_exporter_version }}/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/postgres_exporter.tar.gz"
    mode: "0644"

- name: Extract postgres_exporter
  ansible.builtin.unarchive:
    src: /tmp/postgres_exporter.tar.gz
    dest: /tmp
    remote_src: true

- name: Install postgres_exporter binary
  ansible.builtin.copy:
    src: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64/postgres_exporter"
    dest: "{{ postgres_exporter_bin }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: restart postgres_exporter

- name: Install postgres_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/postgres_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus PostgreSQL Exporter
      After=network.target

      [Service]
      User={{ postgres_exporter_user }}
      Group={{ postgres_exporter_user }}
      Environment=DATA_SOURCE_NAME=postgresql://{{ postgres_exporter_data_source.user }}:{{ postgres_exporter_data_source.password }}@{{ postgres_exporter_data_source.host }}:{{ postgres_exporter_data_source.port }}/{{ postgres_exporter_data_source.database }}?sslmode={{ postgres_exporter_data_source.sslmode }}
      ExecStart={{ postgres_exporter_bin }}

      [Install]
      WantedBy=multi-user.target
  notify:
    - daemon reload
    - restart postgres_exporter

- name: Ensure postgres_exporter enabled and started
  ansible.builtin.systemd:
    name: postgres_exporter
    state: started
    enabled: true
