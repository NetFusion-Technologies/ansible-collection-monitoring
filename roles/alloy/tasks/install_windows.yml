---
- name: Ensure Alloy config directory exists on Windows
  ansible.windows.win_file:
    path: "{{ alloy_config_dir }}"
    state: directory

- name: Ensure Alloy data directory exists on Windows
  ansible.windows.win_file:
    path: "{{ alloy_storage_path }}"
    state: directory

- name: Set default Windows Alloy download URL
  ansible.builtin.set_fact:
    alloy_windows_download_url: "{{ alloy_windows_download_url | default('https://github.com/grafana/alloy/releases/latest/download/alloy-installer-windows-amd64.exe') }}"

- name: Set default Windows Alloy installer path
  ansible.builtin.set_fact:
    alloy_windows_installer_path: "{{ alloy_windows_installer_path | default('C:\\ProgramData\\Alloy\\alloy-installer.exe') }}"

- name: Set default Windows Alloy executable path
  ansible.builtin.set_fact:
    alloy_windows_default_exe: "{{ alloy_windows_default_exe | default('C:\\Program Files\\GrafanaLabs\\Alloy\\alloy-windows-amd64.exe') }}"

- name: Check whether Alloy executable already exists
  ansible.windows.win_stat:
    path: "{{ alloy_windows_default_exe }}"
  register: alloy_windows_exe_stat

- name: Download Alloy installer on Windows
  ansible.windows.win_get_url:
    url: "{{ alloy_windows_download_url }}"
    dest: "{{ alloy_windows_installer_path }}"
    force: "{{ alloy_upgrade | bool }}"
  when:
    - alloy_upgrade | bool or not alloy_windows_exe_stat.stat.exists

- name: Install Alloy on Windows (detached)
  ansible.windows.win_powershell:
    script: |
      $installer = "{{ alloy_windows_installer_path }}"

      if (!(Test-Path $installer)) {
        throw "Installer not found: $installer"
      }

      Start-Process -FilePath $installer -ArgumentList "/S" -WindowStyle Hidden

      Write-Output "started"
  async: 10
  poll: 0
  when:
    - alloy_upgrade | bool or not alloy_windows_exe_stat.stat.exists

- name: Wait for Alloy binary to appear
  ansible.windows.win_wait_for:
    path: "{{ alloy_windows_default_exe }}"
    timeout: 120

- name: Find Alloy executable on Windows
  ansible.windows.win_powershell:
    script: |
      $paths = @(
        "C:\Program Files\GrafanaLabs\Alloy\alloy-windows-amd64.exe",
        "C:\Program Files\GrafanaLabs\Alloy\alloy.exe",
        "C:\Program Files\Alloy\alloy.exe",
        "C:\ProgramData\Alloy\alloy.exe"
      )
      foreach ($p in $paths) {
        if (Test-Path $p) {
          Write-Output $p
          exit 0
        }
      }
      throw "alloy executable not found in expected locations"
  register: alloy_windows_exe_path
  changed_when: false

- name: Set Windows Alloy executable fact
  ansible.builtin.set_fact:
    alloy_windows_exe: "{{ alloy_windows_exe_path.output[0] }}"

