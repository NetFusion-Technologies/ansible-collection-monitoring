---
- name: Stop on unsupported hosts
  ansible.builtin.meta: end_host
  when: ansible_facts["os_family"] not in ["Debian", "RedHat"]

- name: Ensure mongodb_exporter user exists
  ansible.builtin.user:
    name: "{{ mongodb_exporter_user }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Download mongodb_exporter
  ansible.builtin.get_url:
    url: "https://github.com/percona/mongodb_exporter/releases/download/v{{ mongodb_exporter_version }}/mongodb_exporter-{{ mongodb_exporter_version }}.linux-{{ mongodb_exporter_arch }}.tar.gz"
    dest: "/tmp/mongodb_exporter.tar.gz"
    mode: "0644"

- name: Extract mongodb_exporter
  ansible.builtin.unarchive:
    src: /tmp/mongodb_exporter.tar.gz
    dest: /tmp
    remote_src: true

- name: Install mongodb_exporter binary
  ansible.builtin.copy:
    src: "/tmp/mongodb_exporter-{{ mongodb_exporter_version }}.linux-{{ mongodb_exporter_arch }}/mongodb_exporter"
    dest: "{{ mongodb_exporter_bin }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: restart mongodb_exporter

- name: Install mongodb_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ mongodb_exporter_service_name }}.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus MongoDB Exporter
      After=network.target

      [Service]
      User={{ mongodb_exporter_user }}
      Group={{ mongodb_exporter_user }}
      Environment=MONGODB_URI={{ mongodb_exporter_uri }}
      ExecStart={{ mongodb_exporter_bin }} \
        --web.listen-address=:{{ mongodb_exporter_port }} \
        --mongodb.uri=${MONGODB_URI}

      [Install]
      WantedBy=multi-user.target
  notify:
    - daemon reload
    - restart mongodb_exporter

- name: Ensure mongodb_exporter enabled and started
  ansible.builtin.systemd:
    name: "{{ mongodb_exporter_service_name }}"
    state: started
    enabled: true
    daemon_reload: true
