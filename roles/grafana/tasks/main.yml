- name: Stop on non-Debian hosts
  ansible.builtin.meta: end_host
  when: ansible_facts["os_family"] != "Debian"

- name: Install Grafana
  ansible.builtin.apt:
    name:
      - grafana
    state: present
    update_cache: true

- name: Ensure dashboard directory exists
  ansible.builtin.file:
    path: "{{ grafana_dashboards_dir }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Ensure datasource provisioning directory exists
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dir }}/datasources"
    state: directory
    owner: root
    group: grafana
    mode: "0755"

- name: Validate Grafana database configuration
  ansible.builtin.assert:
    that:
      - grafana_database_type in ["sqlite3", "postgres", "mysql"]
      - grafana_database_type == "sqlite3" or grafana_database_host | length > 0
      - grafana_database_type == "sqlite3" or grafana_database_name | length > 0
      - grafana_database_type == "sqlite3" or grafana_database_user | length > 0
      - grafana_database_type == "sqlite3" or grafana_database_password | length > 0
    fail_msg: "Grafana external database configuration is incomplete."
  no_log: true

- name: Deploy Grafana config
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ grafana_config_dir }}/grafana.ini"
    owner: root
    group: grafana
    mode: "0640"
  no_log: true
  notify: restart grafana

- name: Deploy Prometheus datasource provisioning
  ansible.builtin.template:
    src: datasource_prometheus.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/prometheus.yml"
    owner: root
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Deploy Loki datasource provisioning
  ansible.builtin.template:
    src: datasource_loki.yml.j2
    dest: /etc/grafana/provisioning/datasources/loki.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: restart grafana
  become: true

- name: Deploy dashboard provider provisioning
  ansible.builtin.copy:
    src: dashboards_provider.yml
    dest: "{{ grafana_provisioning_dir }}/dashboards/netfusion.yml"
    owner: root
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Deploy starter infrastructure dashboard
  ansible.builtin.copy:
    src: dashboard_infrastructure_overview.json
    dest: "{{ grafana_dashboards_dir }}/infrastructure-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Ensure Grafana service enabled and started
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true

- name: Deploy Proxmox overview dashboard
  ansible.builtin.copy:
    src: dashboard_proxmox_overview.json
    dest: "{{ grafana_dashboards_dir }}/proxmox-overview.json"
    owner: grafana
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Deploy host health dashboard
  ansible.builtin.copy:
    src: dashboard_host_health.json
    dest: "{{ grafana_dashboards_dir }}/host-health.json"
    owner: grafana
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Wait for Grafana API
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/health"
    method: GET
    status_code: 200
  register: grafana_health
  retries: 12
  delay: 5
  until: grafana_health.status == 200
